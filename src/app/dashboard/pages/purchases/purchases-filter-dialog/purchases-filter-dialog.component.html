<p class="font-bold text-xl text-center border-b pb-2 dark:border-slate-800">{{ data.title }}</p>
<div class="w-full p-3 border-b">
  <div class="w-full grid grid-cols-1 sm:grid-cols-1">

    <app-input
      [form]="form"
      name="id"
      icon="bootstrapPostcardFill"
      label="ID compra"
      placeholder="ID compra"
      helpMessage="Sólo se aceptan números enteros"
      errorMessage="Error message."
      [counter]="true"
      [minlength]="1"
      [maxlength]="20">
    </app-input>

    <app-input
      [form]="form"
      name="supplierId"
      icon="bootstrapPostcardFill"
      label="ID proveedor"
      placeholder="ID proveedor"
      helpMessage="Sólo se aceptan números enteros"
      errorMessage="Error message."
      [counter]="true"
      [minlength]="1"
      [maxlength]="20">
    </app-input>

    @if (this.authService?.getUserData()?.role === 'ROLE_ADMIN') {
      <app-select
        [form]="form"
        name="userId"
        label="Usuario"
        icon="matPersonOutline"
        placeholder="Usuario"
        helpMessage="Seleccione un usuario."
        errorMessage="Error message."
        [load]="load"
        [options]="users">
      </app-select>
    }

    <app-select
      [form]="form"
      name="status"
      label="Estado"
      icon="matRuleOutline"
      placeholder="Estado"
      helpMessage="Seleccione un estado."
      errorMessage="Error message."
      [load]="load"
      [options]="statusList">
    </app-select>

    <app-input
      [form]="form"
      name="idBranch"
      icon="matBusinessOutline"
      label="ID sucursal"
      placeholder="ID sucursal"
      helpMessage="Sólo se aceptan números enteros"
      errorMessage="Error message."
      [counter]="true"
      [minlength]="1"
      [maxlength]="20">
    </app-input>

    <app-date-picker
      [form]="form"
      [load]="load"
      [minDate]="minDate"
      [maxDate]="maxDate"
      name="dateCreated"
      placeholder="Fecha creación">
    </app-date-picker>

    <app-date-picker
      [form]="form"
      [load]="load"
      [minDate]="minDate"
      [maxDate]="maxDateDeliver"
      name="deliveryDate"
      placeholder="Fecha entrega">
    </app-date-picker>

  </div>

  <div class="flex justify-center align-middle">
    <button (click)="filter()" [disabled]="load" class="btn-primary h-10 w-40 font-bold">
      Filtrar
    </button>
  </div>
</div>
