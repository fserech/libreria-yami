<app-header
title="Inventarios"
[load]="false"
[showButtonBack]="true">
</app-header>

<ion-content>
  <ion-grid>
    <ion-row class="ion-justify-content-center">
      <ion-col size-xs="12" size-sm="10" size-md="8" size-lg=" " size-xl="7">
        <ion-card class="rounded-4">
          <ion-card-header>
            <ion-card-title>
              <ion-text color="medium">
                <h3><ion-icon name="file-tray-stacked-outline" style="font-size: 20px;"></ion-icon> {{ title }}</h3>
              </ion-text>
            </ion-card-title>
          </ion-card-header>
          <ion-card-content class="mt-2">
            <ion-list>
              <ion-item *ngFor="let product of products.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage) "id="open-modal" expand="block" (click)="openModal(product)">
                <ion-label>
                  <ion-row>
                    <!-- Primera columna -->
                    <ion-col size-xs="6" size-sm="6" size-md="6" size-lg="" size-xl="12">
                      <ion-title style="text-align: start;">{{ firstCapitalLetter(product.name) }}</ion-title>
                    </ion-col>
                    <!-- Segunda columna -->
                    <ion-col size-xs="6" size-sm="6" size-md="6" size-lg="" size-xl="12">
                        <p>{{(product.active) }}</p>
                    </ion-col>
                  </ion-row>
                </ion-label>
              </ion-item>
            </ion-list>
            <ion-button (click)="previousPage()" [disabled]="currentPage === 1"><ion-icon name="arrow-back-circle-outline"></ion-icon></ion-button>
            <ion-button (click)="nextPage()" [disabled]="currentPage * itemsPerPage >= products.length"><ion-icon name="arrow-forward-circle-outline"></ion-icon></ion-button>
          </ion-card-content>
        </ion-card>
     <!-- modal -->
     <ion-card-content color="danger" class="m-0" >
      <ion-modal style="--border-radius: 5px;"  (willDismiss)="onWillDismiss($event)"  >
        <ng-template >
          <ion-header>
            <ion-toolbar color="primary">
              <ion-title class="text-center" ></ion-title>
              <ion-buttons slot="end">
                <ion-button (click)="cancel()" [strong]="true">
                  <ion-icon name="close-circle-outline"></ion-icon>
                </ion-button>
              </ion-buttons>
            </ion-toolbar>
          </ion-header>
          
          <ion-content class="ion-padding" *ngIf="products"  >
            <ion-card class="rounded-4"  >
              <ion-card class="rounded-2" style="border-radius: 10px; border:1px solid var(--ion-color-medium);">
              <ion-card-header>
                <ion-card-subtitle class="ion-text-center">
                  <b>Datos de Movimiento</b>
                </ion-card-subtitle>
              </ion-card-header>
              <ion-card-content class="p-0">
               
                <ion-row>
                  <ion-col size-xs="6" size-sm="6" size-md="6" size-lg="" size-xl="12">
                  <ion-label  > Fecha De Compra: </ion-label>
                </ion-col>
                   <ion-col size-xs="6" size-sm="6" size-md="6" size-lg="" size-xl="12">
                  <ion-label >Fecha de Venta: 
                  </ion-label>
                </ion-col>
              </ion-row>

              <ion-row>
                <ion-col size-xs="6" size-sm="6" size-md="6" size-lg="" size-xl="12">
                <ion-label > Precio Compra: </ion-label>
              </ion-col>
                 <ion-col size-xs="6" size-sm="6" size-md="6" size-lg="" size-xl="12">
                <ion-label >Precio Venta: 
                  <app-input
                  [form]="form"
                  name="priceSale"
                  label="Precio de venta"
                  placeholder="Ingresa precio"
                  [required]="true"
                  [load]="load"
                ></app-input>
                </ion-label>
              </ion-col>
            </ion-row>
              
            </ion-card-content>
          </ion-card>
            <!-- aca puede ir otro cuadro -->
          <ion-card class="rounded-2" style="border-radius: 10px; border:1px solid var(--ion-color-medium);">
            <ion-card-subtitle class="ion-text-center">
              <b>Datos de productos</b>
            </ion-card-subtitle>
            <ion-list mode="ios">
              
                <div style="display: flex;">
                  <!-- Primera columna -->
                  <div style="flex: 2;">
                    <ion-label>Marca: </ion-label>
                  </div>
                
                  <!-- Segunda columna -->
                  <div style="flex: 1;">
                    <ion-label>Categoría: </ion-label>
                  </div>

                  <div style="flex: 1;">
                    <ion-label>Precio Venta: </ion-label>
                  </div>
                </div>
                
            </ion-list>
          </ion-card>
          <ion-row style="border-bottom: 2px solid var(--ion-color-medium); padding: 10px;">
            <ion-col>
              <ion-label color="medium"><b>Total de Compras</b></ion-label>
            </ion-col>
            <ion-col>
              <ion-label color="medium"><b>Q. {{ calculateTotalShoppingPrice() }}</b></ion-label>
            </ion-col>
          </ion-row>
          <ion-row>
            <ion-col>
              <ion-card-content>
                <ion-button >AUTORIZAR</ion-button>
              </ion-card-content>
            </ion-col>
          </ion-row>
          
            </ion-card>
          </ion-content>
        </ng-template>
      </ion-modal>
    </ion-card-content>
     <!-- fin modal -->

      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
