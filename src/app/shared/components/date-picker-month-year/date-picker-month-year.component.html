<ion-item  *ngIf="!load" class="no-border" (click)="openModal()">

  <ion-input #input
    fill="clear"
    mode="md"
    [placeholder]="placeholder"
    [value]="formattedDate"
    [errorText]="'Campo ' + label + ' invalido'"
    helperText="formato de fecha: Mes/Año"
    labelPlacement="floating"
    style="text-align: center; display: block; margin: 0 auto;" readonly>
    <div slot="label" color="primary">{{ required ? label + '*' : label }}</div>
  </ion-input>
  <ion-icon [name]="icon" color="medium" slot="end"></ion-icon>
</ion-item>

<ion-list *ngIf="load">
  <ion-item>
    <ion-label>
      <h3>
        <ion-skeleton-text [animated]="true" style="width: 100%; height: 40px;" class="rounded-3"></ion-skeleton-text>
      </h3>
      <p>
        <ion-skeleton-text [animated]="true" style="width: 60%;" class="rounded-3"></ion-skeleton-text>
      </p>
    </ion-label>
  </ion-item>
</ion-list>

<ion-modal #modal id="example-modal">
  <ng-template class="auto-width-modal">
    <ion-content>
      <ion-toolbar color="primary">
        <ion-title>{{ label }}</ion-title>
        <ion-buttons slot="end">
          <ion-button color="light" (click)="modal.dismiss()">
            <ion-icon style="font-size: 35px;color: white;" name="close-circle-outline"S>
            </ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>

      <ion-datetime
        mode="md"
        [formControl]="getFormControl()"
        class="custom-calendar"
        [presentation]="presentation"
        (ionChange)="changeDate($event)"
        [min]="min"
        [max]="max"
        [preferWheel]="true">
      </ion-datetime>
      <div class="d-flex ion-justify-content-center">
        <ion-button shape="round" (click)="closeModal()">{{ labelButton }}</ion-button>
      </div>
    </ion-content>

  </ng-template>
</ion-modal>
