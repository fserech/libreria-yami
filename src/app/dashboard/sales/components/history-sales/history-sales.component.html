<app-header
  title="Ventas"
  [load]="false"
  [showButtonBack]="true">
</app-header>

<ion-toolbar>
  <ion-row class="row">
    <ion-col class="m-auto d-flex col-12 align-items-center" size-xs="12" size-sm="10" size-md="8" size-lg="5" size-xl="5">
      <ion-searchbar
        placeholder="Buscar"
        shape="round"
        class="rounded-pill"
        (ionInput)="handleInput($event)">
      </ion-searchbar>
      <ion-button>
        <ion-icon class="text-white" name="search-outline"></ion-icon>
      </ion-button>
    </ion-col>
  </ion-row>
</ion-toolbar>

<ion-content class="ion-padding">
  <ion-grid>
    <ion-row class="ion-justify-content-center">
      <ion-col size-xs="12" size-sm="10" size-md="8" size-lg="5" size-xl="5">
        <ion-card class="rounded-4">
          <ion-card-header>
            <ion-card-title>
              <ion-text color="medium">
                <h1><ion-icon name="refresh-outline" style="font-size: 30px;"></ion-icon> {{ title }}</h1>
              </ion-text>
            </ion-card-title>
          </ion-card-header>
          <ion-card-content class="mt-2">
            <ion-list>
              <ion-row style="border-bottom: 2px solid var(--ion-color-medium); padding: 10px;">
                <ion-col>
                  <ion-label color="medium"><b>Descripcion</b></ion-label>
                </ion-col>
                <ion-col>
                  <ion-label color="medium"><b>Total</b></ion-label>
                </ion-col>
                <ion-col>
                  <ion-label color="medium"><b>Fecha</b></ion-label>
                </ion-col>
                <ion-col>
                  <ion-label color="medium"><b>Estado</b></ion-label>
                </ion-col>
              </ion-row>
            </ion-list>
            <ion-list>
              <ion-item *ngFor="let sale of sales">
                <ion-col>
                  <p>{{ sale.description}}</p>
                </ion-col>
                <ion-col>
                  <h2>{{ firstCapitalLetter(sale.total) }}</h2>
                </ion-col>
                <ion-col>
                  <p>{{formatDate (sale.createAt) }}</p>
                </ion-col>
                <ion-col [ngClass]="{'text-danger': !isInvoiceStatus(sale.status), 'text-success': isInvoiceStatus(sale.status)}">
                  <ion-select [(ngModel)]="sale.status" (ionChange)="updateSaleStatus(sale)">
                    <ion-select-option value="UNBILLED">No Facturada</ion-select-option>
                    <ion-select-option value="INVOICED">Facturada</ion-select-option>
                  </ion-select>
                </ion-col>
              </ion-item>
            </ion-list>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
