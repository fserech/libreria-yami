<app-header
  title="Categorias"
  icon="add-outline"
  [showButtonBack]="true">
</app-header>

<!-- Contenido principal -->
<ion-content>
  <!-- Cuadrícula para organizar elementos -->
<ion-grid>
  <!-- Fila centrada -->
  <ion-row class="ion-justify-content-center">
    <!-- Columna de tamaño variable para dispositivos de diferentes tamaños -->
    <ion-col size-xs="12" size-sm="10" size-md="8" size-lg="" size-xl="7">
      <!-- Tarjeta con contenido -->
      <ion-card class="rounded-4">
        <!-- Encabezado de la tarjeta -->
        <ion-card-header>
          <ion-card-title>
            <!-- Título con ícono y texto dinámico -->
            <ion-text color="medium">
              <h1>
                <ion-icon
                  name="{{mode === 'new' ? 'add-outline': mode === 'edit' ? 'create-outline' : 'eye-outline'}}"
                  style="font-size: 30px;">
                </ion-icon>
                {{ title }}
              </h1>
            </ion-text>
          </ion-card-title>
          <ion-card-subtitle
            *ngIf="mode === 'edit'|| mode === 'edit'">
              UID de categoria: <br> {{ record?.uid }}
              <ion-icon
              class="m-0"
              [class.enlarged]="copied"
              style="font-size: 20px;"
              color="primary"
              name="copy-outline"
              (click)="copyToClipboard(record?.uid)"></ion-icon>
            </ion-card-subtitle>
        </ion-card-header>
        <!-- Contenido de la tarjeta -->
        <ion-card-content class="mt-2">
           <!-- Formulario controlado por categoryForm -->
           <form [formGroup]="categoryForm">
            <!-- Primera fila de campos -->
            <ion-row>
              <!-- Columna para el campo de nombre -->
                <ion-col size-xs="12" size-sm="12" size-md="12" size-lg="12" size-xl="12">
                  <app-input
                    [form]="categoryForm"
                    name="name"
                    label="Nombre categoria"
                    placeholder="Ingresa nombre"
                    help="hola mundo soy ayuda"
                    [required]="true"
                    [load]="load"
                  ></app-input>
                </ion-col>
            </ion-row>
            <ion-row>
              <!-- Columna para el campo de rol de usuario -->
              <ion-col size-xs="12" size-sm="12" size-md="12" size-lg="12" size-xl="12">
                <app-input
                  [form]="categoryForm"
                  name="description"
                  label="Descripción de categoria"
                  placeholder="Descripción"
                  [required]="true"
                  [load]="load">
                </app-input>
              </ion-col>
            </ion-row>

            <ion-row>
              <ion-col size-xs="12" size-sm="12" size-md="12" size-lg="12" size-xl="12">
                <app-input-chips
                  [load]="load"
                  [form]="categoryForm"
                  name="keywords"
                  label="Palabras clave"
                  placeholder="Palabras clave"
                  [values]="valuesFirestore"
                  (changes)="chipsEvent($event)"
                  [load]="load"
                  [pattern]="reguexText"
                  patternHint="Solo se aceptan caracteres alfanumericos sin espacios">
                </app-input-chips>
              </ion-col>
            </ion-row>
            <!--boton guardar-->

            <ion-row *ngIf="!load">
              <ion-col>
                <ion-button
                  *ngIf="mode !== 'view'"
                  shape="round"
                  [disabled]="categoryForm.invalid || this.keywords.length === 0"
                  (click)="submit()">{{ mode !== 'new' ? 'Actualizar': 'Guardar'}}</ion-button>
              </ion-col>
            </ion-row>

           </form>
        </ion-card-content>
      </ion-card>
    </ion-col>

  </ion-row>
</ion-grid>

</ion-content>
