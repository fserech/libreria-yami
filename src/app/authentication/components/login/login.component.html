<ion-content mode="ios">
  <div class="container" [@fadeInOut]>

    <ion-card>
      <ion-card-content [formGroup]="form">
        <div class="forgot-password">
          <img width="100" src="https://images.vexels.com/media/users/3/267831/isolated/preview/cd079d709300f6af3cdfa75b83d35db8-icono-de-libros-acogedores-de-invierno.png" alt="">
        </div>
          <ion-list>

            <ion-item>
              <ion-input type="email" formControlName="email" label="Correo electrónico" labelPlacement="floating"></ion-input>
              <ion-icon name="mail" color="medium" slot="end"></ion-icon>
            </ion-item>
            <ion-item>
              <ion-input
                labelPlacement="floating"
                type="{{ hidePassword ? 'password' : 'text' }}"
                formControlName="password" label="Contraseña"
              ></ion-input>
              <ion-icon slot="end" color="medium" name="{{ hidePassword ? 'eye-off' : 'eye' }}" (click)="togglePasswordVisibility()"
              ></ion-icon>
            </ion-item>

          </ion-list>

          <div class="m-auto forgot-password">
          <ion-button (click)="login()" shape="round" [disabled]="form.invalid">Ingresar</ion-button>
          </div>
          <div class="forgot-password">
            <a href="#">¿Olvidaste tu contraseña?</a>
          </div>

      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
