<!-- HEADER -->
<app-header headerTitle="Ventas" headerDescription="Gestión de ventas con control de stock por sucursal."></app-header>

<div class="p-2 m-2 bg-white rounded dark:bg-slate-900 border dark:border-slate-800">

  <!-- ENCABEZADO CON MODO -->
  <div class="w-full border-b text-lg dark:border-slate-700 mb-4 pb-2 flex justify-between items-center">
    <div>
      @if (mode==='new') {
        <p class="text-gray-500 dark:text-gray-300 font-bold">Nueva venta</p>
      }
      @if (mode === 'edit') {
        <div class="flex items-center gap-2">
          <p class="text-gray-500 dark:text-gray-300 text-base"><b>ID venta: </b>{{ id }}</p>
          <span class="px-3 py-1 bg-yellow-100 dark:bg-yellow-900/30 text-yellow-800 dark:text-yellow-300 rounded-full text-sm font-semibold">
            ✏️ Modo Edición
          </span>
        </div>
      }
    </div>

    <button (click)="back()" class="btn-back">
      <ng-icon class="btn-back-icon" size="20" name="matArrowBackOutline"></ng-icon>
      <p class="hidden sm:block text-sm font-bold">Regresar</p>
    </button>
  </div>

  <!-- STEPPER -->
  <mat-stepper
    #stepper
    [linear]="!isEditMode && !isLoadingData"
    [selectedIndex]="isLoadingData ? 0 : undefined"
    (selectionChange)="onStepChange($event)"
    class="w-full">

    <!-- PASO 1: Cliente -->
    <mat-step
      [stepControl]="clientForm"
      [editable]="true"
      [optional]="isLoadingData"
      state="person">
      <ng-template matStepLabel>
        <p class="hidden sm:block">Cliente</p>
      </ng-template>

      <app-orders-client-select
        [preselectedClient]="client"
        (changes)="clientSelect($event)">
      </app-orders-client-select>
    </mat-step>

    <!-- PASO 2: Productos -->
    <mat-step
      [stepControl]="stepTwoForm"
      [editable]="true"
      [optional]="isLoadingData"
      state="shopping_cart">
      <ng-template matStepLabel>
        <p class="hidden sm:block">Productos</p>
      </ng-template>

      <app-orders-products-select
        #selectProducts
        [existingProducts]="products"
        (changes)="productsSelect($event)">
      </app-orders-products-select>
    </mat-step>

    <!-- PASO 3: Confirmación -->
    <mat-step
      [editable]="true"
      [optional]="isLoadingData"
      state="checklist_rtl">
      <ng-template matStepLabel>
        <p class="hidden sm:block">Confirmación</p>
      </ng-template>

      <app-orders-confirm
        #confirmOrder
        (confirmOrder)="submit($event)"
        (backStep)="backStep($event)"
        [client]="client"
        [products]="products"
        [branch]="branch"
        [observation]="observation"
        [orderId]="id"
        [isEditMode]="isEditMode">
      </app-orders-confirm>
    </mat-step>
  </mat-stepper>
</div>
