<ion-app>

  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar>
        <ion-title>Menu Content</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">This is the menu content.</ion-content>
  </ion-menu>
  <div class="ion-page" id="main-content">
    <ion-header>
      <ion-toolbar>
        <ion-buttons slot="start">
          <ion-menu-button></ion-menu-button>
        </ion-buttons>
        <ion-title>Menu</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding"> Tap the button in the toolbar to open the menu. </ion-content>
  </div>

  <ion-tabs>
    <ion-tab-bar *ngIf="!load" slot="bottom">
        <ion-tab-button tab="home" routerLink="{{ 'home' }}" routerLinkActive="active">
          <ion-icon name="grid-outline"></ion-icon>
          Inicio
        </ion-tab-button>

        <ion-tab-button *ngFor="let item of permissionsFooter"  tab="{{ item.path }}" routerLink="{{ item.path }}" routerLinkActive="active">
          <ion-icon name="{{item.icon}}"></ion-icon>
          {{ item.label }}
        </ion-tab-button>

    </ion-tab-bar>

    <ion-tab-bar *ngIf="load" slot="bottom">
      <ion-tab-button *ngFor="let _ of [1,2,3,4]; index as index">
        <ion-skeleton-text [animated]="true" class="rounded-3" style="width: 50px; height: 30px;"></ion-skeleton-text>

    </ion-tab-bar>
