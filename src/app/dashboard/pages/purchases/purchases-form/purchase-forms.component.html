<!-- purchases-form.component.html - COMPLETO -->
<app-header headerTitle="Compras" headerDescription="Gestión de módulo de compras para registrar entradas de inventario."></app-header>

<div class="p-2 m-2 bg-white rounded dark:bg-slate-900 border dark:border-slate-800">

  <!-- HEADER CON BOTÓN REGRESAR -->
  <div class="w-full border-b text-lg dark:border-slate-700 mb-4 pb-2 flex justify-between">
    @if (mode === 'new') {
      <p class="text-gray-500 dark:text-gray-300 font-bold">Nueva Compra</p>
    }
    @if (mode === 'edit' || mode === 'view') {
      <p class="text-gray-500 dark:text-gray-300 text-base"><b>ID compra: </b>{{ id }}</p>
    }
    <button (click)="back()" class="btn-back">
      <ng-icon class="btn-back-icon" size="20" name="matArrowBackOutline"></ng-icon>
      <p class="hidden sm:block text-sm font-bold">Regresar</p>
    </button>
  </div>

  <!-- STEPPER -->
  <mat-stepper #stepper [linear]="true" (selectionChange)="onStepChange($event)" class="w-full">

    <!-- PASO 1: SELECCIONAR PROVEEDOR -->
    <mat-step [stepControl]="supplierForm" [editable]="mode !== 'view'" state="person">
      <ng-template matStepLabel>
        <p class="hidden sm:block">Proveedor</p>
      </ng-template>

      <div class="animate-fadeIn">
        <div class="w-full border-b dark:border-slate-700 pb-2 mb-4">
          <p class="text-gray-500 dark:text-gray-300 text-base">Información del Proveedor</p>
        </div>

        <div class="grid grid-cols-1 gap-4 mb-4">
          <app-select
            [form]="supplierForm"
            name="supplierId"
            label="Proveedor"
            placeholder="Selecciona un proveedor"
            helpMessage="Proveedor de quien realizas la compra"
            errorMessage="El proveedor es requerido"
            [required]="true"
            [load]="load"
            [options]="supplierOptions">
          </app-select>

          <app-input
            [form]="supplierForm"
            name="purchaseDate"
            icon="matCalendarTodayOutline"
            label="Fecha de Compra"
            type="date"
            placeholder="Selecciona la fecha"
            helpMessage="Fecha en que se realiza la compra"
            errorMessage="La fecha es requerida"
            [load]="load">
          </app-input>

          <app-input
            [form]="supplierForm"
            name="observation"
            icon="matDescriptionOutline"
            label="Observaciones (Opcional)"
            placeholder="Notas adicionales sobre la compra"
            helpMessage="Información adicional"
            [minlength]="0"
            [maxlength]="255"
            [counter]="true"
            [load]="load">
          </app-input>
        </div>

        @if (mode !== 'view') {
          <div class="w-full border-b dark:border-slate-700 pb-3 pt-3 flex justify-center sm:justify-end mb-2">
            @if(!load){
              <button
                (click)="goToNextStep()"
                [disabled]="supplierForm.invalid"
                class="btn-primary h-10 w-36 font-bold">
                Continuar
              </button>
            } @else {
              <button class="btn-primary h-10 w-36 font-bold animate-pulse" disabled></button>
            }
          </div>
        }
      </div>
    </mat-step>

    <!-- PASO 2: SELECCIONAR PRODUCTOS -->
    <mat-step [stepControl]="productsForm" [editable]="mode !== 'view'" state="shopping_cart">
      <ng-template matStepLabel>
        <p class="hidden sm:block">Productos</p>
      </ng-template>

      <app-purchases-products-select
        #selectProducts
        [supplierId]="supplierId"
        [disabled]="mode === 'view'"
        (changes)="productsSelect($event)"
        (finalized)="finalizedSelectProducts($event)">
      </app-purchases-products-select>
    </mat-step>

    <!-- PASO 3: CONFIRMACIÓN -->
    <mat-step [editable]="false" state="checklist_rtl">
      <ng-template matStepLabel>
        <p class="hidden sm:block">Confirmación</p>
      </ng-template>

      <app-purchases-confirm
        #confirmPurchase
        [mode]="mode"
        [supplierId]="supplierId"
        [supplierName]="supplierName"
        [products]="products"
        [purchaseDate]="purchaseDate"
        [observation]="observation"
        (confirmPurchase)="submit($event)"
        (backStep)="backStep($event)">
      </app-purchases-confirm>
    </mat-step>
  </mat-stepper>

</div>
