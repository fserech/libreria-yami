<!-- HEADER -->
<app-header headerTitle="Compras" headerDescription="Gestión de compras con control de stock por sucursal."></app-header>

<div class="p-2 m-2 bg-white rounded dark:bg-slate-900 border dark:border-slate-800">
  <div class="w-full border-b text-lg dark:border-slate-700 mb-4 pb-2 flex justify-between">
    @if (mode==='new') {
      <p class="text-gray-500 dark:text-gray-300 font-bold">Nueva compra</p>
    }
    @if (mode === 'edit'|| mode === 'view') {
      <p class="text-gray-500 dark:text-gray-300 text-base"><b>ID compra: </b>{{ id }}</p>
    }
    <button (click)="back()" class="btn-back">
      <ng-icon class="btn-back-icon" size="20" name="matArrowBackOutline"></ng-icon>
      <p class="hidden sm:block text-sm font-bold">Regresar</p>
    </button>
  </div>

  <mat-stepper #stepper [linear]="true" (selectionChange)="onStepChange($event)" class="w-full">

    <!-- ✅ PASO 1: Selección de Proveedor -->
    <mat-step [stepControl]="supplierForm" [editable]="false" state="person">
      <ng-template matStepLabel>
        <p class="hidden sm:block">Proveedor</p>
      </ng-template>
      <app-purchases-supplier-select
        (changes)="supplierSelect($event)">
      </app-purchases-supplier-select>
    </mat-step>

    <!-- ✅ PASO 2: Selección de Productos -->
    <mat-step [stepControl]="stepTwoForm" [editable]="true" state="shopping_cart">
      <ng-template matStepLabel>
        <p class="hidden sm:block">Productos</p>
      </ng-template>
      <app-purchases-products-select
        #selectProducts
        (changes)="productsSelect($event)"
        (finalized)="finalizedSelectProducts($event)">
      </app-purchases-products-select>
    </mat-step>

    <!-- ✅ PASO 3: Confirmación de la Compra -->
    <mat-step [stepControl]="stepThreeForm" [editable]="false" state="checklist_rtl">
      <ng-template matStepLabel>
        <p class="hidden sm:block">Confirmación</p>
      </ng-template>

      <!-- ✅ Validación para asegurar que supplier existe antes de renderizar -->
      @if (supplier && supplier.id && products.length > 0) {
        <app-purchases-confirm
          #confirmPurchase
          (confirmPurchase)="confirmPurchaseWithDialog()"
          (backStep)="backStep($event)"
          [supplier]="supplier"
          [products]="products"
          [branch]="branch"
          [observation]="observation">
        </app-purchases-confirm>
      } @else {
        <div class="p-8 text-center">
          <div class="animate-pulse">
            <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4 mx-auto mb-4"></div>
            <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-1/2 mx-auto"></div>
          </div>
          <p class="text-gray-500 dark:text-gray-400 mt-4">Cargando información de la compra...</p>
        </div>
      }
    </mat-step>
  </mat-stepper>
</div>
