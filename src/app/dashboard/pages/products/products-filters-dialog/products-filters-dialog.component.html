<p class="font-bold text-xl text-center border-b pb-2 dark:border-slate-800">{{ data.title }}</p>

<div class="w-full p-3 border-b">
  <div class="w-full grid grid-cols-1 sm:grid-cols-1 gap-2">

    <!-- ID del Producto -->
    <app-input
      [form]="form"
      name="id"
      icon="bootstrapPostcardFill"
      label="ID Producto"
      placeholder="ID Producto"
      helpMessage="Sólo se aceptan números"
      errorMessage="Error message."
      [counter]="true"
      [minlength]="1"
      [maxlength]="20">
    </app-input>

    <!-- Nombre del Producto -->
    <app-input
      [form]="form"
      name="name"
      icon="matDriveFileRenameOutlineOutline"
      label="Nombre de producto"
      placeholder="Nombre de producto"
      helpMessage="Sólo se aceptan caracteres alfanuméricos"
      errorMessage="Error message."
      [counter]="true"
      [minlength]="1"
      [maxlength]="200">
    </app-input>

    <!-- Filtro de Tipo de Producto -->
    <app-select
      [form]="form"
      name="hasVariants"
      icon="matCategoryOutline"
      label="Tipo de producto"
      placeholder="Seleccionar tipo"
      helpMessage="Filtrar por tipo de producto"
      [options]="variantOptions"
      [load]="load">
    </app-select>

    <!-- Filtro de Estado -->
    <app-select
      [form]="form"
      name="active"
      icon="matToggleOnOutline"
      label="Estado"
      placeholder="Seleccionar estado"
      helpMessage="Filtrar por estado activo/inactivo"
      [options]="statusOptions"
      [load]="load">
    </app-select>

  </div>

  <!-- Rango de Precios -->
  <p class="p-2 font-bold text-center w-100 m-1 mt-4">Rango de precios</p>
  <div class="grid grid-cols-2 gap-4 w-full justify-between align-middle">
    <app-input
      [form]="form"
      name="initPrice"
      icon="matAttachMoneyOutline"
      label="Desde"
      placeholder="Desde"
      helpMessage="Sólo se aceptan números"
      errorMessage="Error message."
      [counter]="true"
      [minlength]="1"
      [maxlength]="10">
    </app-input>

    <app-input
      [form]="form"
      name="endPrice"
      icon="matAttachMoneyOutline"
      label="Hasta"
      placeholder="Hasta"
      helpMessage="Sólo se aceptan números"
      errorMessage="Error message."
      [counter]="true"
      [minlength]="1"
      [maxlength]="10">
    </app-input>
  </div>

  <!-- Botón de Filtrar -->
  <div class="flex justify-center align-middle mt-4">
    <button (click)="filter()" [disabled]="load" class="btn-primary h-10 w-40 font-bold">
      Filtrar
    </button>
  </div>
</div>
