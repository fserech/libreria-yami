<!-- HEADER -->
<app-header headerTitle="Ventas" headerDescription="Gestión de ventas con control de stock por sucursal."></app-header>

<div class="p-2 m-2 bg-white rounded dark:bg-slate-900 border dark:border-slate-800">
  <div class="w-full border-b text-lg dark:border-slate-700 mb-4 pb-2 flex justify-between">
    @if (mode==='new') {
      <p class="text-gray-500 dark:text-gray-300 font-bold">Nueva venta</p>
    }
    @if (mode === 'edit'|| mode === 'view') {
      <p class="text-gray-500 dark:text-gray-300 text-base"><b>ID venta: </b>{{ id }}</p>
    }
    <button (click)="back()" class="btn-back">
      <ng-icon class="btn-back-icon" size="20" name="matArrowBackOutline"></ng-icon>
      <p class="hidden sm:block text-sm font-bold">Regresar</p>
    </button>
  </div>

  <mat-stepper #stepper [linear]="true" (selectionChange)="onStepChange($event)" class="w-full">
    <!-- PASO 1: Selección de Cliente -->
    <mat-step [stepControl]="clientForm" [editable]="false" state="person">
      <ng-template matStepLabel>
        <p class="hidden sm:block">Cliente</p>
      </ng-template>
      <app-orders-client-select
        (changes)="clientSelect($event)">
      </app-orders-client-select>
    </mat-step>

    <!-- PASO 2: Selección de Productos y Sucursal -->
    <mat-step [stepControl]="stepTwoForm" [editable]="true" state="shopping_cart">
      <ng-template matStepLabel>
        <p class="hidden sm:block">Productos y Sucursal</p>
      </ng-template>
      <app-orders-products-select
        #selectProducts
        (changes)="productsSelect($event)"
        (finalized)="finalizedSelectProducts($event)">
      </app-orders-products-select>

      <!-- Botones de control del paso 2 -->
      <div class="flex justify-end gap-3 mt-4 pt-4 border-t dark:border-slate-700">
        <button
          (click)="goToPreviousStep()"
          type="button"
          class="px-6 py-2 bg-gray-500 hover:bg-gray-600 text-white rounded-lg font-semibold transition-colors">
          Atrás
        </button>
        <button
          [disabled]="selectedProducts.length === 0"
          (click)="selectProducts.finalizeSelection()"
          type="button"
          class="px-6 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed text-white rounded-lg font-semibold transition-colors">
          Continuar
        </button>
      </div>
    </mat-step>

    <!-- PASO 3: Confirmación de la Venta -->
    <mat-step [editable]="false" state="checklist_rtl">
      <ng-template matStepLabel>
        <p class="hidden sm:block">Confirmación</p>
      </ng-template>
      <app-orders-confirm
        #confirmOrder
        (confirmOrder)="submit($event)"
        (backStep)="backStep($event)"
        [client]="client"
        [products]="products"
        [branch]="branch"
        [observation]="observation">
      </app-orders-confirm>
    </mat-step>
  </mat-stepper>
</div>
