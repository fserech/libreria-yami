<!-- menu-customizer.component.html -->
<div class="menu-customizer p-4">
  <h2 class="text-2xl font-bold mb-4 text-slate-700 dark:text-slate-300">Personalizar Menú</h2>

  <div cdkDropList (cdkDropListDropped)="drop($event)" class="menu-list">
    <div *ngFor="let item of menuItems"
         cdkDrag
         class="menu-item flex items-center justify-between p-3 mb-2 bg-white dark:bg-slate-800 rounded border dark:border-slate-700 cursor-move hover:bg-slate-50 dark:hover:bg-slate-700">

      <div class="flex items-center gap-3">
        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>

        <span class="font-medium text-slate-700 dark:text-slate-300">{{item.label}}</span>
      </div>

      <label class="flex items-center gap-2 cursor-pointer">
        <span class="text-sm text-slate-600 dark:text-slate-400">Visible</span>
        <input
          type="checkbox"
          [checked]="item.visible"
          (change)="toggleVisibility(item)"
          class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
      </label>
    </div>
  </div>

  <div class="flex gap-2 mt-4">
    <button (click)="saveOrder()" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
      Guardar Orden
    </button>
    <button (click)="resetOrder()" class="px-4 py-2 bg-gray-600 text-white rounded hover:bg-gray-700">
      Restablecer
    </button>
  </div>
</div>
