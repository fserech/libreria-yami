<app-header
  title="Marcas"
  icon="add-outline"
  [showButtonBack]="true">
</app-header>

<ion-content>
  <!-- Cuadrícula para organizar elementos -->
  <ion-grid>
    <!-- Fila centrada -->
    <ion-row class="ion-justify-content-center">
      <!-- Columna de tamaño variable para dispositivos de diferentes tamaños -->
      <ion-col size-xs="12" size-sm="10" size-md="8" size-lg="" size-xl="7">
        <!-- Tarjeta con contenido -->
        <ion-card class="rounded-4">
          <!-- Encabezado de la tarjeta -->
          <ion-card-header>
            <ion-card-title>
              <!-- Título con ícono y texto dinámico -->
              <ion-text color="medium">
                <h1>
                  <ion-icon
                    name="{{ mode === 'new' ? 'add-outline' : mode === 'edit' ? 'create-outline' : 'eye-outline' }}"
                    style="font-size: 30px;">
                  </ion-icon>
                  {{ title }}
                </h1>
              </ion-text>
            </ion-card-title>
            <ion-card-subtitle
              *ngIf="mode === 'edit' || mode === 'edit'">
              UID de marca: <br> {{ record?.uid }}
              <ion-icon
                class="m-0"
                [class.enlarged]="copied"
                style="font-size: 20px;"
                color="primary"
                name="copy-outline"
                (click)="copyToClipboard(record?.uid)"></ion-icon>
            </ion-card-subtitle>
          </ion-card-header>
          <!-- Contenido de la tarjeta -->
          <ion-card-content class="mt-2">
            <!-- Formulario controlado por categoryForm -->
            <form [formGroup]="brandForm">
              <!-- Primera fila de campos -->
              <ion-row>
                <!-- Columna para el campo de nombre -->
                <ion-col size-xs="12" size-sm="12" size-md="12" size-lg="12" size-xl="12">
                  <app-input
                    [form]="brandForm"
                    name="name"
                    label="Nombre de la marca"
                    placeholder="Ingresa el nombre"
                    [required]="true"
                    [load]="load"
                  ></app-input>
                </ion-col>
              </ion-row>
              <ion-row>
                <!-- Columna para el campo de descripción -->
                <ion-col size-xs="12" size-sm="12" size-md="12" size-lg="12" size-xl="12">
                  <app-input
                    [form]="brandForm"
                    name="description"
                    label="Descripción de la marca"
                    placeholder="Descripción"
                    [required]="true"
                    [load]="load">
                  </app-input>
                </ion-col>
              </ion-row>

              <!-- Botón guardar -->
              <ion-row *ngIf="!load">
                <ion-col>
                  <ion-button
                    *ngIf="mode !== 'view'"
                    shape="round"
                    [disabled]="brandForm.invalid"
                    (click)="submit()">{{ mode !== 'new' ? 'Actualizar' : 'Guardar'}}</ion-button>
                </ion-col>
              </ion-row>

            </form>
          </ion-card-content>
        </ion-card>
      </ion-col>

    </ion-row>
  </ion-grid>

</ion-content>
